<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detetive - Bloco de Notas</title>
    <style>
        /* CSS — Estilização do Jogo Original Integrada */
        :root {
            --gold: #c9a84c;
            --gold-l: #e8c96b;
            --gold-d: #8a6520;
            --cr: #8b1a1a;
            --cr-d: #5c0e0e;
            --dk: #0d0a08;
            --dk2: #1a1410;
            --dk3: #2a2018;
            --parch: #f5edd8;      /* Cor de papel pergaminho do bloco */
            --text-dark: #2a1008;  /* Cor de caneta envelhecida */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--dk);
            color: #f2e8d0;
            font-family: 'Crimson Text', serif;
            line-height: 1.6;
            padding-bottom: 90px; /* Espaço para o botão flutuante */
        }

        header {
            background: linear-gradient(180deg, #140f0b, var(--dk));
            padding: 24px 12px;
            text-align: center;
            border-bottom: 2px solid var(--gold-d);
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            margin-bottom: 1.5rem;
        }

        h1 {
            font-family: 'Cinzel Decorative', serif;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 22px;
            text-shadow: 0 2px 4px #000;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
            padding: 0 12px;
        }

        /* Seção do Bloco de Notas Estilo Vintage */
        .category-section {
            background-color: var(--parch);
            border-radius: 4px;
            margin-bottom: 2rem;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.7);
            border: 1px solid var(--gold-d);
            position: relative;
        }

        .category-header {
            background: linear-gradient(135deg, var(--cr), var(--cr-d));
            color: var(--gold-l);
            padding: 10px 16px 10px 36px;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 2px;
            border-bottom: 2px solid var(--gold-d);
        }

        /* Linhas contábeis vermelhas nas margens do papel do caderno antigo */
        .category-section::before {
            content: '';
            position: absolute;
            left: 26px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(255, 100, 100, 0.25);
            pointer-events: none;
            z-index: 2;
        }

        /* Lista de Itens (Linhas do Bloco) */
        .item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px 10px 36px;
            border-bottom: 1px solid rgba(139, 26, 26, 0.12);
            transition: all 0.2s ease;
            min-height: 54px;
        }

        .item-row:last-child { border-bottom: none; }

        .item-name {
            flex-grow: 1;
            font-family: 'IM Fell English', serif;
            font-size: 16px;
            color: var(--text-dark);
            font-weight: 600;
        }

        /* Controles de marcação adaptados do Jogo */
        .controls {
            display: flex;
            gap: 6px;
        }

        .btn-mark {
            width: 34px;
            height: 34px;
            border-radius: 2px;
            border: 1px solid rgba(92, 64, 32, 0.3);
            background: transparent;
            color: rgba(92, 64, 32, 0.5);
            font-family: 'Cinzel', serif;
            font-size: 12px;
            cursor: pointer;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        /* ══════════ ESTADOS ATIVOS ══════════ */
        
        /* X - Inocente */
        .item-row.state-innocent {
            opacity: 0.45;
            background-color: rgba(50, 50, 50, 0.04);
        }
        .item-row.state-innocent .item-name {
            text-decoration: line-through;
            font-style: italic;
        }
        .item-row.state-innocent .btn-x {
            background-color: #3a3a3a;
            color: white;
            border-color: #3a3a3a;
        }

        /* ✓ - Possui a carta */
        .item-row.state-has {
            border-left: 4px solid var(--cr);
            background-color: rgba(139, 26, 26, 0.06);
        }
        .item-row.state-has .item-name {
            color: var(--cr-d);
        }
        .item-row.state-has .btn-v {
            background-color: var(--cr);
            color: white;
            border-color: var(--cr);
        }

        /* ? - Dúvida */
        .item-row.state-doubt {
            background-color: rgba(201, 168, 76, 0.08);
        }
        .item-row.state-doubt .item-name {
            color: #8a6520;
            font-style: italic;
        }
        .item-row.state-doubt .btn-q {
            background-color: var(--gold-d);
            color: white;
            border-color: var(--gold-d);
        }

        /* Botão Resetar Flutuante Carmesim */
        .reset-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }

        .btn-reset {
            background: linear-gradient(135deg, var(--cr), var(--cr-d));
            color: white;
            border: 1px solid var(--gold);
            padding: 14px 24px;
            border-radius: 30px;
            font-family: 'Cinzel', serif;
            font-size: 10px;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,0,0,0.6);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .btn-reset:active { transform: scale(0.94); }

        /* Responsividade */
        @media (max-width: 400px) {
            .item-row { padding-left: 32px; padding-right: 8px; }
            .btn-mark { width: 30px; height: 30px; font-size: 11px; }
            .item-name { font-size: 14px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Investigação</h1>
        <p style="color: var(--gold-l); font-size: 9px; font-family: 'Cinzel', serif; letter-spacing: 3px; opacity: 0.6; margin-top: 2px;">BLOCO DE NOTAS CRIMINAL</p>
    </header>

    <div class="container" id="main-content">
        </div>

    <div class="reset-container">
        <button class="btn-reset" onclick="confirmReset()">Resetar Jogo</button>
    </div>

    <script>
        const gameData = {
            "Suspeitos": [
                "Coronel Mostarda", "Dona Branca", "Dona Violeta", 
                "Professor Black", "Sr. Marinho", "Senhorita Rosa"
            ],
            "Armas": [
                "Cano de Ferro", "Corda", "Adaga", 
                "Pistola", "Castiçal", "Chave Inglesa"
            ],
            "Locais": [
                "Biblioteca", "Cozinha", "Entrada", "Salão de Jogos", 
                "Escritório", "Jardim de Inverno", "Sala de Estar", 
                "Sala de Jantar", "Salão de Festas"
            ]
        };

        let gameState = JSON.parse(localStorage.getItem('detetive_save')) || {};

        function initGame() {
            const container = document.getElementById('main-content');
            container.innerHTML = '';

            for (const [category, items] of Object.entries(gameData)) {
                const section = document.createElement('section');
                section.className = 'category-section';
                
                let html = `<div class="category-header">${category}</div>`;
                
                items.forEach(item => {
                    const status = gameState[item] || '';
                    const stateClass = status ? `state-${status}` : '';
                    
                    html += `
                        <div class="item-row ${stateClass}" id="row-${slugify(item)}">
                            <span class="item-name">${item}</span>
                            <div class="controls">
                                <button class="btn-mark btn-x" onclick="toggleStatus('${item}', 'innocent')">X</button>
                                <button class="btn-mark btn-v" onclick="toggleStatus('${item}', 'has')">✓</button>
                                <button class="btn-mark btn-q" onclick="toggleStatus('${item}', 'doubt')">?</button>
                            </div>
                        </div>
                    `;
                });

                section.innerHTML = html;
                container.appendChild(section);
            }
        }

        function toggleStatus(item, status) {
            if (gameState[item] === status) {
                gameState[item] = null;
            } else {
                gameState[item] = status;
            }
            
            saveAndRefresh();
        }

        function saveAndRefresh() {
            localStorage.setItem('detetive_save', JSON.stringify(gameState));
            updateUI();
        }

        function updateUI() {
            for (const [category, items] of Object.entries(gameData)) {
                items.forEach(item => {
                    const row = document.getElementById(`row-${slugify(item)}`);
                    if(!row) return;
                    const status = gameState[item];
                    
                    row.classList.remove('state-innocent', 'state-has', 'state-doubt');
                    
                    if (status) {
                        row.classList.add(`state-${status}`);
                    }
                });
            }
        }

        function confirmReset() {
            if (confirm("Deseja realmente apagar todas as marcações? Esta ação não pode ser desfeita.")) {
                gameState = {};
                localStorage.removeItem('detetive_save');
                initGame();
                window.scrollTo({top: 0, behavior: 'smooth'});
            }
        }

        function slugify(text) {
            return text.toString().toLowerCase().trim()
                .replace(/\s+/g, '-')           
                .replace(/[^\w\-]+/g, '')       
                .replace(/\-\-+/g, '-');
        }

        initGame();
    </script>
</body>
</html>
